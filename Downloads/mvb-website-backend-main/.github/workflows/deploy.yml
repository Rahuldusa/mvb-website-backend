name: MVB Backend Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh

          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa

          chmod 600 ~/.ssh/id_rsa

          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy Backend Files
        run: |
          rsync -avz --delete \
          -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
          ./ \
          root@${{ secrets.SERVER_HOST }}:/var/www/html/mvb-website-backend/

      - name: Install Dependencies and Restart Backend
        run: |
          ssh -i ~/.ssh/id_rsa \
          -o StrictHostKeyChecking=no \
          root@${{ secrets.SERVER_HOST }} \
          "cd /var/www/html/mvb-website-backend && npm install && pm2 restart mvb-backend || pm2 start server.js --name mvb-backend && pm2 save"